<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Noticia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">Blog de Noticias</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <a class="nav-link" href="login.html" id="login-link">Login</a>
          <a class="nav-link" href="register.html" id="register-link">Registro</a>
          <span class="navbar-text" id="user-section" style="display:none;">
            <span id="username"></span>
          </span>
          <button class="btn btn-sm btn-outline-secondary" id="logout-btn" style="display:none;">Cerrar sesión</button>
          <a href="crear-noticia.html" class="btn btn-sm btn-primary" id="create-news-btn" style="display:none;">Crear noticia</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="row">
      <main class="col-lg-9">
        <!-- News Detail -->
        <article class="news-detail" id="news-detail">
          <!-- Cargado por JS -->
        </article>

        <!-- Likes Section -->
        <section class="likes-section" id="likes-section">
          <!-- Cargado por JS -->
        </section>

        <!-- Comments Section -->
        <section class="comments-section">
          <h3>Comentarios</h3>
          <div id="comments-list">
            <!-- Cargado por JS -->
          </div>
          <form id="comment-form" class="mt-4">
            <div class="mb-3">
              <label for="comment-content" class="form-label">Escribe un comentario</label>
              <textarea class="form-control" id="comment-content" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Comentar</button>
          </form>
        </section>
      </main>

      <aside class="col-lg-3">
        <!-- Espacio para widgets futuros -->
      </aside>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center">
    <p>&copy; 2026 Blog de Noticias. Desarrollado por estudiante Sustantiva.</p>
    <p>Contacto: contacto@blognoticias.com</p>
  </footer>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/detail.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
