<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Noticia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">Blog de Noticias</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="navbar-text" id="user-section" style="display:none;">
            <span id="username"></span>
          </span>
          <button class="btn btn-sm btn-outline-secondary" id="logout-btn" style="display:none;">Cerrar sesión</button>
          <a href="crear-noticia.html" class="btn btn-sm btn-primary" id="create-news-btn" style="display:none;">Crear noticia</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="form-container">
      <h2>Crear Noticia</h2>
      <form id="create-news-form" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="title" class="form-label">Título (máx. 60 caracteres)</label>
          <input type="text" class="form-control" id="title" maxlength="60" required>
        </div>
        <div class="mb-3">
          <label for="author" class="form-label">Autor (máx. 40 caracteres)</label>
          <input type="text" class="form-control" id="author" maxlength="40" required>
        </div>
        <div class="mb-3">
          <label for="category_id" class="form-label">Categoría</label>
          <select class="form-select" id="category_id">
            <option value="">Sin categoría</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="image" class="form-label">Imagen (máx. 2 MB)</label>
          <input type="file" class="form-control" id="image" accept="image/*">
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Contenido (máx. 4000 caracteres)</label>
          <textarea class="form-control" id="content" rows="8" maxlength="4000" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Publicar noticia</button>
        <div id="create-news-msg" class="mt-3"></div>
      </form>
    </div>
  </main>

  <footer class="text-center">
    <p>&copy; 2026 Blog de Noticias. Desarrollado por estudiante Sustantiva.</p>
  </footer>

  <script type="module">
    import { createNews, getCategories } from './js/api.js';
    import { isLoggedIn, getCurrentUser, logout, updateNavbar } from './js/auth.js';

    if (!isLoggedIn()) {
      alert('Debes iniciar sesión para crear una noticia');
      window.location.href = 'login.html';
    }

    async function loadCategories() {
      try {
        const categories = await getCategories();
        const select = document.getElementById('category_id');
        categories.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat.id;
          option.textContent = cat.name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error al cargar categorías:', err);
      }
    }

    async function handleCreate(e) {
      e.preventDefault();
      const formData = new FormData();
      formData.append('title', document.getElementById('title').value);
      formData.append('author', document.getElementById('author').value);
      formData.append('content', document.getElementById('content').value);
      const catId = document.getElementById('category_id').value;
      if (catId) formData.append('category_id', catId);
      const imageFile = document.getElementById('image').files[0];
      if (imageFile) formData.append('image', imageFile);

      try {
        await createNews(formData);
        document.getElementById('create-news-msg').textContent = 'Noticia publicada. Redirigiendo...';
        document.getElementById('create-news-msg').style.color = 'green';
        setTimeout(() => (window.location.href = 'index.html'), 1500);
      } catch (err) {
        document.getElementById('create-news-msg').textContent = err.message;
        document.getElementById('create-news-msg').style.color = 'red';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateNavbar();
      loadCategories();
      document.getElementById('create-news-form').addEventListener('submit', handleCreate);
      document.getElementById('logout-btn')?.addEventListener('click', logout);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
