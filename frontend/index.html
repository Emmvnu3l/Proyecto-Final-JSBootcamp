<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog de Noticias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">Blog de Noticias</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <a class="nav-link" href="login.html" id="login-link">Login</a>
          <a class="nav-link" href="register.html" id="register-link">Registro</a>
          <span class="navbar-text" id="user-section" style="display:none;">
            <span id="username"></span>
          </span>
          <button class="btn btn-sm btn-outline-secondary" id="logout-btn" style="display:none;">Cerrar sesión</button>
          <a href="crear-noticia.html" class="btn btn-sm btn-primary" id="create-news-btn" style="display:none;">Crear noticia</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="container text-center">
      <h1>Blog de Noticias</h1>
      <p>Las últimas noticias sobre todo lo que te interesa</p>
    </div>
  </section>

  <!-- Main Content -->
  <div class="container">
    <div class="row">
      <!-- Sidebar Categories -->
      <aside class="col-lg-3">
        <div class="category-sidebar">
          <h3>Categorías</h3>
          <ul class="list-group" id="category-list">
            <!-- Cargado por JS -->
          </ul>
        </div>
      </aside>

      <!-- News List -->
      <main class="col-lg-9">
        <!-- Order Controls -->
        <div class="order-controls">
          <label for="order-select">Ordenar por fecha:</label>
          <select id="order-select" class="form-select form-select-sm">
            <option value="desc">Más reciente primero</option>
            <option value="asc">Más antiguo primero</option>
          </select>
        </div>

        <!-- News List -->
        <ul class="news-list" id="news-list">
          <!-- Cargado por JS -->
        </ul>
      </main>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center">
    <p>&copy; 2026 Blog de Noticias. Desarrollado por estudiante Sustantiva.</p>
    <p>Contacto: contacto@blognoticias.com</p>
  </footer>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/home.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
