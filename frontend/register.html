<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">Blog de Noticias</a>
    </div>
  </nav>

  <main class="container">
    <div class="form-container">
      <h2>Crear cuenta</h2>
      <form id="register-form">
        <div class="mb-3">
          <label for="username" class="form-label">Usuario (máx. 40 caracteres)</label>
          <input type="text" class="form-control" id="username" maxlength="40" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrarse</button>
        <div class="mt-3 text-center">
          <span>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></span>
        </div>
        <div id="register-msg" class="mt-3"></div>
      </form>
    </div>
  </main>

  <footer class="text-center">
    <p>&copy; 2026 Blog de Noticias. Desarrollado por estudiante Sustantiva.</p>
  </footer>

  <script type="module" src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
